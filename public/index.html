<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>美食地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --panel: #fffdf9;
      --ink: #24211d;
      --muted: #71695d;
      --line: #dfd6c8;
      --brand: #c33d2e;
      --meal: #b64232;
      --snack: #d68a1f;
      --hotpot: #8f3a55;
      --sweet: #347f72;
      --place: #3c6fa7;
      --weak: #7b746a;
      --shadow: 0 14px 35px rgba(46, 35, 21, .12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(350px, 430px) minmax(0, 1fr);
      height: 100vh;
      height: 100dvh;
    }

    aside {
      z-index: 5;
      display: flex;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    header {
      flex: 0 0 auto;
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .toolbar {
      flex: 0 0 auto;
      display: grid;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: #fffaf2;
    }

    .search {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--ink);
      font-size: 14px;
      background: white;
      outline: none;
    }

    .search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(195, 61, 46, .12);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--ink);
      font-size: 12px;
      line-height: 1;
      background: white;
      cursor: pointer;
    }

    .filter.active {
      color: white;
      border-color: var(--brand);
      background: var(--brand);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 12px 120px;
    }

    .item {
      width: 100%;
      margin: 0 0 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 11px 12px;
      text-align: left;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
    }

    .item:hover,
    .item.active {
      border-color: var(--line);
      background: #fff7eb;
    }

    .item-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.35;
    }

    .badges {
      display: flex;
      flex: 0 0 auto;
      gap: 5px;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 7px;
      color: white;
      font-weight: 600;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
      background: var(--weak);
    }

    .badge.city {
      background: var(--place);
    }

    .item-address,
    .item-note,
    .item-recs {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .item-note,
    .item-recs {
      margin-top: 4px;
    }

    #map {
      height: 100vh;
      height: 100dvh;
      min-width: 0;
      background: #e6ded1;
    }

    .pin {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 2px solid #fff;
      border-radius: 50% 50% 50% 8px;
      color: white;
      font-weight: 800;
      font-size: 12px;
      box-shadow: 0 7px 18px rgba(30, 22, 18, .24);
      transform: rotate(-45deg);
    }

    .pin span {
      transform: rotate(45deg);
    }

    .pin.snack { background: var(--snack); }
    .pin.meal { background: var(--meal); }
    .pin.hotpot { background: var(--hotpot); }
    .pin.sweet { background: var(--sweet); }
    .pin.place { background: var(--place); }
    .pin.low {
      background: var(--weak);
      border-style: dashed;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }

    .popup {
      width: 260px;
    }

    .popup h2 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.25;
    }

    .popup p {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .popup ul {
      margin: 8px 0 10px;
      padding-left: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .popup a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border-radius: 6px;
      padding: 0 10px;
      color: white;
      font-size: 12px;
      text-decoration: none;
      background: var(--brand);
    }

    .empty,
    .footnote {
      margin: 14px 4px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      background: #fffaf2;
    }

    .footnote strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 54vh auto;
        height: auto;
        min-height: 100vh;
      }

      aside {
        grid-row: 2;
        min-height: 46vh;
        border-top: 1px solid var(--line);
        border-right: 0;
      }

      #map {
        grid-row: 1;
        height: 54vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside>
      <header>
        <h1>美食地图</h1>
        <p class="summary">按城市、片区和清单沉淀美食点位。灰色虚线点表示小摊、片区或分店不确定项，导航前建议再核对营业状态。</p>
      </header>

      <section class="toolbar">
        <input class="search" id="search" type="search" placeholder="搜城市、店名、地址、菜品">
        <div class="filters" id="destinationFilters"></div>
        <div class="filters" id="categoryFilters"></div>
        <div class="meta">
          <span id="count"></span>
          <span>中国坐标已为 OSM 底图做偏移校正</span>
        </div>
      </section>

      <section class="list" id="list"></section>
    </aside>

    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="food-data.js"></script>
  <script>
    const categoryLabels = {
      all: "全部类型",
      snack: "小吃早餐",
      meal: "江湖家常",
      hotpot: "火锅串串",
      sweet: "甜品饮品",
      place: "片区景点"
    };

    const data = window.FOOD_MAP_DATA;
    const destinations = data.destinations;
    const items = data.items;
    const destinationById = Object.fromEntries(destinations.map((item) => [item.id, item]));

    const outOfChina = (lat, lng) => lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
    const transformLat = (x, y) => {
      let ret = -100 + 2 * x + 3 * y + .2 * y * y + .1 * x * y + .2 * Math.sqrt(Math.abs(x));
      ret += (20 * Math.sin(6 * x * Math.PI) + 20 * Math.sin(2 * x * Math.PI)) * 2 / 3;
      ret += (20 * Math.sin(y * Math.PI) + 40 * Math.sin(y / 3 * Math.PI)) * 2 / 3;
      ret += (160 * Math.sin(y / 12 * Math.PI) + 320 * Math.sin(y * Math.PI / 30)) * 2 / 3;
      return ret;
    };
    const transformLng = (x, y) => {
      let ret = 300 + x + 2 * y + .1 * x * x + .1 * x * y + .1 * Math.sqrt(Math.abs(x));
      ret += (20 * Math.sin(6 * x * Math.PI) + 20 * Math.sin(2 * x * Math.PI)) * 2 / 3;
      ret += (20 * Math.sin(x * Math.PI) + 40 * Math.sin(x / 3 * Math.PI)) * 2 / 3;
      ret += (150 * Math.sin(x / 12 * Math.PI) + 300 * Math.sin(x / 30 * Math.PI)) * 2 / 3;
      return ret;
    };
    const gcjToWgs = (lat, lng) => {
      if (outOfChina(lat, lng)) return { lat, lng };
      const a = 6378245;
      const ee = 0.006693421622965943;
      let dLat = transformLat(lng - 105, lat - 35);
      let dLng = transformLng(lng - 105, lat - 35);
      const radLat = lat / 180 * Math.PI;
      let magic = Math.sin(radLat);
      magic = 1 - ee * magic * magic;
      const sqrtMagic = Math.sqrt(magic);
      dLat = (dLat * 180) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
      dLng = (dLng * 180) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
      return { lat: lat * 2 - (lat + dLat), lng: lng * 2 - (lng + dLng) };
    };

    items.forEach((item, index) => {
      item.order = index;
      const converted = gcjToWgs(item.lat, item.lng);
      item.mapLat = converted.lat;
      item.mapLng = converted.lng;
    });

    const map = L.map("map", { zoomControl: false });
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const state = {
      destination: "all",
      category: "all",
      query: "",
      active: null
    };

    const destinationFiltersEl = document.getElementById("destinationFilters");
    const categoryFiltersEl = document.getElementById("categoryFilters");
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");
    const searchEl = document.getElementById("search");
    const markers = new Map();

    const escapeHtml = (value) => String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    const destinationOptions = [{ id: "all", label: "全部地区" }, ...destinations];
    const addFilterButtons = (container, options, stateKey) => {
      options.forEach((option) => {
        const button = document.createElement("button");
        button.className = `filter ${option.id === state[stateKey] ? "active" : ""}`;
        button.type = "button";
        button.textContent = option.label;
        button.addEventListener("click", () => {
          state[stateKey] = option.id;
          state.active = null;
          [...container.children].forEach((el) => el.classList.remove("active"));
          button.classList.add("active");
          render();
        });
        container.appendChild(button);
      });
    };

    addFilterButtons(destinationFiltersEl, destinationOptions, "destination");
    addFilterButtons(categoryFiltersEl, Object.entries(categoryLabels).map(([id, label]) => ({ id, label })), "category");

    const categoryInitial = (item) => categoryLabels[item.category].slice(0, 1);
    const mapLinkFor = (item) => {
      const q = encodeURIComponent(item.name || item.title);
      return `https://maps.apple.com/?q=${q}&ll=${item.lat},${item.lng}`;
    };

    const makeIcon = (item) => L.divIcon({
      className: "",
      html: `<div class="pin ${item.category} ${item.confidence === "low" ? "low" : ""}"><span>${categoryInitial(item)}</span></div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 29],
      popupAnchor: [0, -26]
    });

    const recommendationList = (item) => {
      if (!item.recommendations || !item.recommendations.length) return "";
      return `<ul>${item.recommendations.map((text) => `<li>${escapeHtml(text)}</li>`).join("")}</ul>`;
    };

    const popupHtml = (item) => {
      const city = destinationById[item.destination];
      return `
        <div class="popup">
          <h2>${escapeHtml(item.title)}</h2>
          <p><strong>${escapeHtml(item.name || item.title)}</strong> · ${escapeHtml(city.label)}</p>
          <p>${escapeHtml(item.address)}</p>
          <p>${escapeHtml(item.note || "")}</p>
          ${recommendationList(item)}
          <a href="${mapLinkFor(item)}" target="_blank" rel="noreferrer">打开 Apple 地图</a>
        </div>
      `;
    };

    items.forEach((item) => {
      const marker = L.marker([item.mapLat, item.mapLng], { icon: makeIcon(item) })
        .bindPopup(popupHtml(item));
      marker.on("click", () => {
        state.active = item.id;
        renderList(currentItems(), false);
      });
      marker.addTo(map);
      markers.set(item.id, marker);
    });

    const currentItems = () => {
      const query = state.query.trim().toLowerCase();
      return items.filter((item) => {
        const destinationMatch = state.destination === "all" || item.destination === state.destination;
        const categoryMatch = state.category === "all" || item.category === state.category;
        const city = destinationById[item.destination];
        const recommendations = (item.recommendations || []).join(" ");
        const text = `${city.label} ${city.country} ${city.region} ${item.title} ${item.name} ${item.address} ${item.note} ${recommendations}`.toLowerCase();
        return destinationMatch && categoryMatch && (!query || text.includes(query));
      });
    };

    const renderMarkers = (visibleItems) => {
      const visible = new Set(visibleItems.map((item) => item.id));
      items.forEach((item) => {
        const marker = markers.get(item.id);
        const isVisible = visible.has(item.id);
        if (isVisible && !map.hasLayer(marker)) marker.addTo(map);
        if (!isVisible && map.hasLayer(marker)) marker.remove();
      });
      if (visibleItems.length) {
        map.fitBounds(L.latLngBounds(visibleItems.map((item) => [item.mapLat, item.mapLng])).pad(.16), {
          animate: true,
          maxZoom: visibleItems.length === 1 ? 16 : 13
        });
      }
    };

    const confidenceText = (confidence) => ({
      high: "准",
      medium: "分店",
      low: "待核"
    }[confidence] || "点");

    const shortRecommendations = (item) => {
      if (!item.recommendations || !item.recommendations.length) return "";
      const shown = item.recommendations.slice(0, 3).join(" / ");
      const more = item.recommendations.length > 3 ? ` 等 ${item.recommendations.length} 项` : "";
      return `${shown}${more}`;
    };

    const renderList = (visibleItems, updateBounds = true) => {
      listEl.innerHTML = "";
      countEl.textContent = `${visibleItems.length} 个点位`;

      if (!visibleItems.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有匹配的地点。";
        listEl.appendChild(empty);
        return;
      }

      visibleItems.forEach((item) => {
        const city = destinationById[item.destination];
        const button = document.createElement("button");
        button.className = `item ${state.active === item.id ? "active" : ""}`;
        button.type = "button";
        button.innerHTML = `
          <div class="item-title">
            <span>${escapeHtml(item.title)}</span>
            <span class="badges">
              <span class="badge city">${escapeHtml(city.label)}</span>
              <span class="badge">${confidenceText(item.confidence)}</span>
            </span>
          </div>
          <p class="item-address">${escapeHtml(item.name || item.title)} · ${escapeHtml(item.address)}</p>
          <p class="item-note">${escapeHtml(item.note || "")}</p>
          ${shortRecommendations(item) ? `<p class="item-recs">${escapeHtml(shortRecommendations(item))}</p>` : ""}
        `;
        button.addEventListener("click", () => {
          const marker = markers.get(item.id);
          state.active = item.id;
          map.setView([item.mapLat, item.mapLng], 16, { animate: true });
          marker.openPopup();
          renderList(visibleItems, false);
        });
        listEl.appendChild(button);
      });

      const footnote = document.createElement("div");
      footnote.className = "footnote";
      footnote.innerHTML = `<strong>数据说明</strong><div>重庆多为单店点位；四川/成都先按截图片区录入，弹窗内列出该片区清单。后续新增城市或国家时，只需要在 <code>food-data.js</code> 加 destination 和 items。</div>`;
      listEl.appendChild(footnote);

      if (updateBounds) renderMarkers(visibleItems);
    };

    const render = () => renderList(currentItems());

    searchEl.addEventListener("input", (event) => {
      state.query = event.target.value;
      state.active = null;
      render();
    });

    render();
  </script>
</body>
</html>
