<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重庆美食地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --panel: #fffdf9;
      --ink: #24211d;
      --muted: #71695d;
      --line: #dfd6c8;
      --brand: #c33d2e;
      --meal: #b64232;
      --snack: #d68a1f;
      --hotpot: #8f3a55;
      --sweet: #347f72;
      --place: #3c6fa7;
      --weak: #7b746a;
      --shadow: 0 14px 35px rgba(46, 35, 21, .12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      height: 100%;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(340px, 410px) minmax(0, 1fr);
      height: 100vh;
      height: 100dvh;
    }

    aside {
      z-index: 5;
      display: flex;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    header {
      flex: 0 0 auto;
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .toolbar {
      flex: 0 0 auto;
      display: grid;
      gap: 12px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: #fffaf2;
    }

    .search {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      background: white;
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(195, 61, 46, .12);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--ink);
      font-size: 12px;
      line-height: 1;
      background: white;
      cursor: pointer;
    }

    .filter.active {
      color: white;
      border-color: var(--brand);
      background: var(--brand);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 12px 120px;
    }

    .item {
      width: 100%;
      margin: 0 0 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 11px 12px;
      text-align: left;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
    }

    .item:hover,
    .item.active {
      border-color: var(--line);
      background: #fff7eb;
    }

    .item-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.35;
    }

    .badge {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 4px 7px;
      color: white;
      font-weight: 600;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
      background: var(--weak);
    }

    .item-address,
    .item-note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .item-note {
      margin-top: 4px;
    }

    #map {
      height: 100vh;
      min-width: 0;
      background: #e6ded1;
    }

    .pin {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 2px solid #fff;
      border-radius: 50% 50% 50% 8px;
      color: white;
      font-weight: 800;
      font-size: 12px;
      box-shadow: 0 7px 18px rgba(30, 22, 18, .24);
      transform: rotate(-45deg);
    }

    .pin span {
      transform: rotate(45deg);
    }

    .pin.snack { background: var(--snack); }
    .pin.meal { background: var(--meal); }
    .pin.hotpot { background: var(--hotpot); }
    .pin.sweet { background: var(--sweet); }
    .pin.place { background: var(--place); }
    .pin.low {
      background: var(--weak);
      border-style: dashed;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }

    .popup {
      width: 240px;
    }

    .popup h2 {
      margin: 0 0 8px;
      font-size: 16px;
      line-height: 1.25;
    }

    .popup p {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .popup a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border-radius: 6px;
      padding: 0 10px;
      color: white;
      font-size: 12px;
      text-decoration: none;
      background: var(--brand);
    }

    .empty,
    .unmapped {
      margin: 14px 4px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      background: #fffaf2;
    }

    .unmapped strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 58vh auto;
        height: auto;
        min-height: 100vh;
      }

      aside {
        grid-row: 2;
        min-height: 42vh;
        border-top: 1px solid var(--line);
        border-right: 0;
      }

      #map {
        grid-row: 1;
        height: 58vh;
      }
    }
  </style>
</head>

      "土豆丝饼：清单里写“随便买，小摊都有”，不标固定点。",
      "特产：渝兄怪味胡豆、陈昌银麻花、天友酸奶牛奶、合川肉片、牛浪汉豆腐香干，适合在超市、特产店、机场/高铁站按品牌买。"
    ];

    const outOfChina = (lat, lng) => lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271;
    const transformLat = (x, y) => {
      let ret = -100 + 2 * x + 3 * y + .2 * y * y + .1 * x * y + .2 * Math.sqrt(Math.abs(x));
      ret += (20 * Math.sin(6 * x * Math.PI) + 20 * Math.sin(2 * x * Math.PI)) * 2 / 3;
      ret += (20 * Math.sin(y * Math.PI) + 40 * Math.sin(y / 3 * Math.PI)) * 2 / 3;
      ret += (160 * Math.sin(y / 12 * Math.PI) + 320 * Math.sin(y * Math.PI / 30)) * 2 / 3;
      return ret;
    };
    const transformLng = (x, y) => {
      let ret = 300 + x + 2 * y + .1 * x * x + .1 * x * y + .1 * Math.sqrt(Math.abs(x));
      ret += (20 * Math.sin(6 * x * Math.PI) + 20 * Math.sin(2 * x * Math.PI)) * 2 / 3;
      ret += (20 * Math.sin(x * Math.PI) + 40 * Math.sin(x / 3 * Math.PI)) * 2 / 3;
      ret += (150 * Math.sin(x / 12 * Math.PI) + 300 * Math.sin(x / 30 * Math.PI)) * 2 / 3;
      return ret;
    };
    const gcjToWgs = (lat, lng) => {
      if (outOfChina(lat, lng)) return { lat, lng };
      const a = 6378245;
      const ee = 0.006693421622965943;
      let dLat = transformLat(lng - 105, lat - 35);
      let dLng = transformLng(lng - 105, lat - 35);
      const radLat = lat / 180 * Math.PI;
      let magic = Math.sin(radLat);
      magic = 1 - ee * magic * magic;
      const sqrtMagic = Math.sqrt(magic);
      dLat = (dLat * 180) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
      dLng = (dLng * 180) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
      return { lat: lat * 2 - (lat + dLat), lng: lng * 2 - (lng + dLng) };
    };

    items.forEach((item) => {
      const converted = gcjToWgs(item.lat, item.lng);
      item.mapLat = converted.lat;
      item.mapLng = converted.lng;
    });

    const map = L.map("map", {
      zoomControl: false
    });

    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const bounds = L.latLngBounds(items.map((item) => [item.mapLat, item.mapLng]));
    map.fitBounds(bounds.pad(.12));

    const state = {
      category: "all",
      query: "",
      active: null
    };

    const filtersEl = document.getElementById("filters");
    const listEl = document.getElementById("list");
    const countEl = document.getElementById("count");
    const searchEl = document.getElementById("search");
    const markers = new Map();

    Object.entries(categories).forEach(([key, label]) => {
      const button = document.createElement("button");
      button.className = `filter ${key === state.category ? "active" : ""}`;
      button.type = "button";
      button.textContent = label;
      button.addEventListener("click", () => {
        state.category = key;
        document.querySelectorAll(".filter").forEach((el) => el.classList.remove("active"));
        button.classList.add("active");
        render();
      });
      filtersEl.appendChild(button);
    });

    const categoryInitial = (item) => categories[item.category].slice(0, 1);
    const linkFor = (item) => {
      const q = encodeURIComponent(item.name);
      return `https://maps.apple.com/?q=${q}&ll=${item.lat},${item.lng}`;
    };

    const makeIcon = (item) => L.divIcon({
      className: "",
      html: `<div class="pin ${item.category} ${item.confidence === "low" ? "low" : ""}"><span>${categoryInitial(item)}</span></div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 29],
      popupAnchor: [0, -26]
    });

    const popupHtml = (item) => `
      <div class="popup">
        <h2>${item.title}</h2>
        <p><strong>${item.name}</strong></p>
        <p>${item.address}</p>
        <p>${item.note}</p>
        <a href="${linkFor(item)}" target="_blank" rel="noreferrer">打开 Apple 地图</a>
      </div>
    `;

    items.forEach((item) => {
      const marker = L.marker([item.mapLat, item.mapLng], { icon: makeIcon(item) })
        .bindPopup(popupHtml(item));
      marker.on("click", () => {
        state.active = item.title;
        renderList(currentItems(), false);
      });
      marker.addTo(map);
      markers.set(item.title, marker);
    });

    const currentItems = () => {
      const query = state.query.trim().toLowerCase();
      return items.filter((item) => {
        const categoryMatch = state.category === "all" || item.category === state.category;
        const text = `${item.title} ${item.name} ${item.address} ${item.note}`.toLowerCase();
        return categoryMatch && (!query || text.includes(query));
      });
    };

    const renderMarkers = (visibleItems) => {
      const visible = new Set(visibleItems.map((item) => item.title));
      items.forEach((item) => {
        const marker = markers.get(item.title);
        const isVisible = visible.has(item.title);
        if (isVisible && !map.hasLayer(marker)) marker.addTo(map);
        if (!isVisible && map.hasLayer(marker)) marker.remove();
      });
      if (visibleItems.length) {
        map.fitBounds(L.latLngBounds(visibleItems.map((item) => [item.mapLat, item.mapLng])).pad(.18), {
          animate: true,
          maxZoom: visibleItems.length === 1 ? 16 : 13
        });
      }
    };

    const confidenceText = (confidence) => ({
      high: "准",
      medium: "分店",
      low: "待核"
    }[confidence]);

    const renderList = (visibleItems, updateBounds = true) => {
      listEl.innerHTML = "";
      countEl.textContent = `${visibleItems.length} 个定位点`;

      if (!visibleItems.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有匹配的地点。";
        listEl.appendChild(empty);
        return;
      }

      visibleItems.forEach((item) => {
        const button = document.createElement("button");
        button.className = `item ${state.active === item.title ? "active" : ""}`;
        button.type = "button";
        button.innerHTML = `
          <div class="item-title">
            <span>${item.title}</span>
            <span class="badge">${confidenceText(item.confidence)}</span>
          </div>
          <p class="item-address">${item.name} · ${item.address}</p>
          <p class="item-note">${item.note}</p>
        `;
        button.addEventListener("click", () => {
          const marker = markers.get(item.title);
          state.active = item.title;
          map.setView([item.mapLat, item.mapLng], 16, { animate: true });
          marker.openPopup();
          renderList(visibleItems, false);
        });
        listEl.appendChild(button);
      });

      const note = document.createElement("div");
      note.className = "unmapped";
      note.innerHTML = `<strong>未单独上图</strong>${unmapped.map((text) => `<div>${text}</div>`).join("")}`;
      listEl.appendChild(note);

      if (updateBounds) renderMarkers(visibleItems);
    };

    const render = () => {
      const visibleItems = currentItems();
      renderList(visibleItems);
    };

    searchEl.addEventListener("input", (event) => {
      state.query = event.target.value;
      state.active = null;
      render();
    });

    render();
  </script>
</body>
</html>
